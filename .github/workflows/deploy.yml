# 原始文件内容（已注释备份）——保留原始说明，避免删减。
# 原始：包含一些说明和原始 workflow 内容，已移到注释中以便参考。

name: Deploy Personal Tech Card
on:
  push:
    branches:
      - main # 只在main分支更新时触发
jobs:
  build-and-deploy:
    # 步骤9.3：提交CI配置
    # 10. 配置GitHub Pages【必做】
    # 步骤10.1：启用 GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Generate HTML file
        run: python build_page.py
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 上传整个目录，GitHub Pages 会找到 index.html
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4